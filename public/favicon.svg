<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f0f0f"/>

  <!-- Robot head body -->
  <rect x="14" y="20" width="36" height="28" rx="6" fill="#1a1a1a" stroke="#C8F135" stroke-width="2"/>

  <!-- Antenna -->
  <line x1="32" y1="20" x2="32" y2="12" stroke="#C8F135" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="10" r="3" fill="#C8F135"/>

  <!-- Eyes -->
  <rect x="19" y="27" width="10" height="7" rx="2" fill="#C8F135"/>
  <rect x="35" y="27" width="10" height="7" rx="2" fill="#E85D04"/>

  <!-- Eye shine dots -->
  <circle cx="22" cy="29" r="1.5" fill="#0f0f0f"/>
  <circle cx="38" cy="29" r="1.5" fill="#0f0f0f"/>

  <!-- Mouth -->
  <rect x="21" y="38" width="22" height="5" rx="2.5" fill="#1a1a1a" stroke="#C8F135" stroke-width="1.5"/>
  <!-- Mouth teeth/grid lines -->
  <line x1="28" y1="38" x2="28" y2="43" stroke="#C8F135" stroke-width="1"/>
  <line x1="32" y1="38" x2="32" y2="43" stroke="#C8F135" stroke-width="1"/>
  <line x1="36" y1="38" x2="36" y2="43" stroke="#C8F135" stroke-width="1"/>

  <!-- Ear bolts -->
  <rect x="10" y="29" width="4" height="8" rx="2" fill="#C8F135"/>
  <rect x="50" y="29" width="4" height="8" rx="2" fill="#C8F135"/>
</svg>
